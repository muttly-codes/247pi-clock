<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π</title>
    <link href="<https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400&display=swap>" rel="stylesheet">
    <link href="<https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap>" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Source Code Pro', monospace;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: background 2s ease;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            transition: background 2s ease;
        }

        .pi-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            color: black;
        }

        .pi-grid {
            line-height: 1.4;
            letter-spacing: 0.15em;
            word-wrap: break-word;
            word-break: break-all;
        }

        .digit {
            display: inline;
            color: inherit;
        }

        .time-hour {
            font-family: 'Orbitron', 'Courier New', monospace !important;
            color: #0055FF;
            font-weight: 900 !important;
            font-style: normal !important;
        }

        .time-minute {
            font-family: 'Orbitron', 'Courier New', monospace !important;
            color: #00ff00;
            font-weight: 900 !important;
            font-style: normal !important;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="circle" id="circle"></div>
    </div>
    
    <div class="pi-container">
        <div class="pi-grid" id="pi-grid"></div>
    </div>

    <script>

66039666557309254711055785376346682065310989652691862056476931257058635662018558100729360659876486117910453348850346113657686753249441668039626579787718556084552965412665408530614344431858676975145661406800700237877659134401712749470420562230538994561314071127000407854733269939081454664645880797270826683063432858785698305235808933065757406795457163775254202114955761581400250126228594130216471550979259230990796547376125517656751357517829666454779174501129961489030463994713296210734043751895735961458901938971311179042978285647503203198691514028708085990480109412147221317947647772622414254854540332157185306142288137585043063321751829798662237172159160771669254748738986654949450114654062843366393790039769265672146385306736096571209180763832716641627488880078692560290228472104031721186082041900042296617119637792133757511495950156604963186294726547364252308177036751590673502350728354056704038674351362222477158915049530984489333096340878076932599397805419341447377441842631298608099888687413260472156951623965864573021631598193195167353812974167729478672422924654366800980676928238280689964004824354037014163149658979409243237896907069779422362508221688957383798623001593776471651228935786015881617557829735233460428151262720373431465319777741603199066554187639792933441952154134189948544473456738316249934191318148092777710386387734317720754565453220777092120190516609628049092636019759882816133231666365286193266863360627356763035447762803504507772355471058595487027908143562401451718062464362679456127531813407833033625423278444795382437205835311477119926063813346776879695970309833913077109870408591337464144282277263465947047458784778720192771528073176790770715721344473060570073349243693113835049316312840425121925651798069411352801314701304781643788518529092854520116583934196562134914341595625865865570552690496520985803385072242648293972858478316305777756068887644624824685792603953527734803048029005876075825104747091643961362676044925627420420832085661190625454337213153595845068772460290161876679524061634252257719542916299193064553779037379027847818577805321712268066130019278766111959092164201989";
        
        const PI_DIGITS = "3." + PI_DECIMALS;

        function findTimeForMinuteOfDay(hour, minute, piDigits) {
            const hourStr = String(hour).padStart(2, '0');
            const minuteStr = String(minute).padStart(2, '0');
            const minuteOfDay = hour * 60 + minute;

            const pairs = [];
            let searchPos = 0;
            while (searchPos < piDigits.length) {
                const hourPos = piDigits.indexOf(hourStr, searchPos);
                if (hourPos === -1) break;
                const minutePos = piDigits.indexOf(minuteStr, hourPos + 2);
                if (minutePos !== -1) {
                    pairs.push({ hourPos, minutePos });
                }
                searchPos = hourPos + 1;
            }

            if (pairs.length === 0) return null;

            const idx = Math.round((minuteOfDay / 1439) * (pairs.length - 1));
            return pairs[Math.min(idx, pairs.length - 1)];
        }

        function calculateFontSize() {
            const targetLines = 28;
            const lineHeight = 1.4;
            const availableHeight = window.innerHeight * 0.98;
            const fontSize = Math.floor(availableHeight / (targetLines * lineHeight));
            return Math.max(12, Math.min(fontSize, 24));
        }

        function calculateEqualBorders() {
            const container = document.querySelector('.pi-container');
            const grid = document.getElementById('pi-grid');
            const fontSize = parseFloat(window.getComputedStyle(grid).fontSize);
            const letterSpacing = parseFloat(window.getComputedStyle(grid).letterSpacing);
            const charWidth = fontSize * 0.6 + letterSpacing;
            const availableWidth = window.innerWidth;
            const charsPerLine = Math.floor(availableWidth / charWidth);
            const textWidth = charsPerLine * charWidth;
            const leftover = availableWidth - textWidth;
            const horizontalPadding = leftover / 2;
            const verticalPadding = window.innerHeight * 0.01;
            container.style.padding = `${verticalPadding}px ${horizontalPadding}px`;
        }

        function updateBackground() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const timeOfDay = (hours + minutes / 60) / 24;
            const sunHeight = Math.cos((timeOfDay - 0.5) * Math.PI * 2);
            const brightness = (sunHeight + 1) / 2;
            const insideValue = Math.round(30 + brightness * 225);
            const insideColor = `rgb(${insideValue}, ${insideValue}, ${insideValue})`;
            const outsideValue = Math.round(30 + (1 - brightness) * 225);
            const outsideColor = `rgb(${outsideValue}, ${outsideValue}, ${outsideValue})`;
            const diameter = Math.max(window.innerWidth, window.innerHeight) * 0.9;
            const circle = document.getElementById('circle');
            circle.style.width = diameter + 'px';
            circle.style.height = diameter + 'px';
            const leftOffset = (window.innerWidth - diameter) / 2;
            const topOffset = (window.innerHeight - diameter) / 2;
            circle.style.left = leftOffset + 'px';
            circle.style.top = topOffset + 'px';
            circle.style.background = insideColor;
            document.querySelector('.background').style.background = outsideColor;
        }

        function updateFontSize() {
            const fontSize = calculateFontSize();
            document.getElementById('pi-grid').style.fontSize = fontSize + 'px';
        }

        let _isNightMode = null;

        function updateTextColor(skipTransition) {
            const h = new Date().getHours();
            const shouldBeNight = h >= 18 || h < 6;
            if (shouldBeNight === _isNightMode) return;
            _isNightMode = shouldBeNight;

            const container = document.querySelector('.pi-container');
            if (skipTransition) {
                container.style.transition = 'color 0s';
                container.style.color = shouldBeNight ? 'white' : 'black';
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    container.style.transition = 'color 15s ease';
                }));
            } else {
                container.style.color = shouldBeNight ? 'white' : 'black';
            }
        }

        function generatePiDisplay() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();

            const timePos = findTimeForMinuteOfDay(hour, minute, PI_DIGITS);
            
            if (!timePos) {
                document.getElementById('pi-grid').textContent = PI_DIGITS;
                return;
            }
            
            const { hourPos, minutePos } = timePos;
            let html = '';
            
            for (let i = 0; i < PI_DIGITS.length; i++) {
                const digit = PI_DIGITS[i];
                if (i === hourPos) {
                    html += `<span class="time-hour">${digit}`;
                } else if (i === hourPos + 1) {
                    html += `${digit}</span>`;
                } else if (i === minutePos) {
                    html += `<span class="time-minute">${digit}`;
                } else if (i === minutePos + 1) {
                    html += `${digit}</span>`;
                } else {
                    html += `<span class="digit">${digit}</span>`;
                }
            }
            
            document.getElementById('pi-grid').innerHTML = html;
        }

        function init() {
            updateFontSize();
            calculateEqualBorders();
            updateBackground();
            generatePiDisplay();
            updateTextColor(true);
        }

        init();
        setInterval(() => {
            updateBackground();
            generatePiDisplay();
            updateTextColor(false);
        }, 1000);

        window.addEventListener('resize', () => {
            updateFontSize();
            calculateEqualBorders();
            updateBackground();
        });
    </script>
</body>
</html>
